{% extends 'base.html' %}

{% block title %}Вход — Интернет-магазин{% endblock %}

{% block content %}
    <h2>Вход в аккаунт</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>

    <p style="margin-top: 15px;">
        Ещё нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
    </p>
{% endblock %}
